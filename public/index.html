<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grisburgh</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            room:    { bg: '#f5edd8', surface: '#efe3c5', elevated: '#e6d5ad', border: '#c4a87a', 'border-light': '#d4bc92' },
            ink:     { bright: '#2a1a08', medium: '#5a4030', dim: '#8a7050', faint: '#b09870' },
            gold:    { DEFAULT: '#b8860b', dim: '#9a7008', glow: 'rgba(184,134,11,0.12)' },
            seal:    { DEFAULT: '#8b2a2a', glow: 'rgba(139,42,42,0.15)' },
            'blue-ink':  { DEFAULT: '#2a5a8a', glow: 'rgba(42,90,138,0.12)' },
            'green-wax': { DEFAULT: '#2a6a3a', glow: 'rgba(42,106,58,0.12)' },
            'purple-codex': { DEFAULT: '#5a3a7a', glow: 'rgba(90,58,122,0.12)' },
            orange:  { DEFAULT: '#9a6a2a', glow: 'rgba(154,106,42,0.12)' },
            parchment: { letter: '#f2e6c8', press: '#e8e2d8', map: '#e0d8c4', codex: '#1a1520', log: '#f5f0e5' },
          },
          fontFamily: {
            cinzel:  ['Cinzel', 'serif'],
            crimson: ['Crimson Text', 'Georgia', 'serif'],
            fell:    ['IM Fell English', 'serif'],
            mono:    ['JetBrains Mono', 'monospace'],
          },
          boxShadow: {
            card: '0 2px 12px rgba(0,0,0,0.4)',
            deep: '0 8px 32px rgba(0,0,0,0.6)',
          },
          animation: {
            'modal-in': 'modalIn 0.25s ease',
            'fade-in': 'fadeIn 0.2s ease',
            'reveal-burst': 'revealBurst 0.6s ease',
          },
          keyframes: {
            modalIn:  { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            fadeIn:   { from: { opacity: '0' }, to: { opacity: '1' } },
            revealBurst: { '0%': { boxShadow: '0 0 0 0 rgba(212,168,67,0.6)' }, '100%': { boxShadow: '0 0 20px 10px rgba(212,168,67,0)' } },
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/css/theme.css?v=16">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-room-bg text-ink-bright font-crimson min-h-screen">
  <div class="app player-mode" id="app">
    <!-- Header -->
    <header class="px-6 pt-5 pb-4 bg-room-elevated border-b-2 border-room-border">
      <div class="flex items-center gap-4">
        <!-- Title -->
        <div class="flex-shrink-0">
          <div id="header-display">
            <div class="flex items-center gap-2">
              <h1 id="app-title" class="font-cinzel text-4xl font-black text-ink-bright tracking-wider leading-none">Grisburgh</h1>
              <button id="header-edit-btn" class="dm-only hidden text-ink-faint hover:text-gold transition-colors leading-none" onclick="window.app.editHeader()" title="Titel bewerken" style="font-size:14px;padding:2px 4px;background:none;border:none;cursor:pointer;">&#9998;</button>
            </div>
            <div class="mt-1.5 flex items-center gap-1.5">
              <span class="text-gold-dim text-[10px] leading-none select-none">✦</span>
              <div class="h-px w-8" style="background:linear-gradient(to right,transparent,#9a7008)"></div>
              <p id="app-subtitle" class="text-ink-medium text-sm font-fell italic">Ontdekkingen uit het stadsarchief</p>
              <div class="h-px w-8" style="background:linear-gradient(to left,transparent,#9a7008)"></div>
              <span class="text-gold-dim text-[10px] leading-none select-none">✦</span>
            </div>
            <!-- Speler-identiteit onder de ondertitel -->
            <div id="player-identity" class="hidden items-center gap-1.5 mt-1">
              <span class="text-xs text-ink-dim select-none">Speelt als</span>
              <span id="player-name-display" class="text-xs font-cinzel font-bold text-gold"></span>
              <button onclick="window.app.openPlayerPicker()" title="Wisselen van karakter"
                class="text-xs text-ink-faint hover:text-gold transition-colors leading-none" style="background:none;border:none;cursor:pointer;padding:0 2px">✎</button>
              <button onclick="window.app.playerLogout()" title="Anoniem verder"
                class="text-xs text-ink-faint hover:text-seal transition-colors leading-none" style="background:none;border:none;cursor:pointer;padding:0 2px">✕</button>
            </div>
            <!-- Karakter kiezen (zichtbaar als anonieme speler) -->
            <button id="player-pick-btn" class="hidden text-xs text-ink-dim hover:text-gold transition-colors font-cinzel mt-1"
              onclick="window.app.openPlayerPicker()" title="Kies je karakter">👤 Kies karakter</button>
          </div>
          <div id="header-editor" class="hidden space-y-1.5">
            <input id="header-title-input" type="text"
              class="font-cinzel font-black text-ink-bright tracking-wider bg-room-bg border border-room-border rounded px-2 py-0.5 focus:border-gold-dim focus:outline-none w-full"
              style="font-size:1.6rem">
            <input id="header-subtitle-input" type="text"
              class="font-fell italic text-ink-medium text-sm bg-room-bg border border-room-border rounded px-2 py-0.5 focus:border-gold-dim focus:outline-none w-full">
            <div class="flex gap-2">
              <button onclick="window.app.saveHeader()"
                class="px-3 py-1 text-xs font-cinzel font-bold bg-gold/20 hover:bg-gold/30 text-gold border border-gold/40 rounded transition">Opslaan</button>
              <button onclick="window.app.cancelHeader()"
                class="px-3 py-1 text-xs font-cinzel text-ink-dim hover:text-ink-medium border border-room-border rounded transition">Annuleren</button>
            </div>
          </div>
        </div>
        <!-- Groepswisselaar + party portraits -->
        <div class="flex flex-col flex-1 min-w-0">
          <div id="group-switcher" class="dm-only hidden flex items-center gap-1 flex-wrap mb-1"></div>
          <div id="party-bar" class="flex items-end gap-3 overflow-x-auto pt-1"></div>
        </div>
        <!-- DM toggle -->
        <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
          <div class="flex items-center gap-2">
            <span id="dm-toggle-label" class="text-xs font-mono text-ink-dim select-none">DM</span>
            <button id="dm-toggle" onclick="window.app.dmToggleClick()" title="Dungeon Master modus"
              class="relative w-11 h-6 rounded-full border border-room-border bg-room-elevated transition-all duration-300 flex-shrink-0">
              <span id="dm-toggle-knob"
                class="absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-ink-faint shadow transition-all duration-300"></span>
            </button>
            <button id="dm-logout-btn" onclick="window.app.dmLogout()" title="Uitloggen als DM"
              class="hidden text-xs text-ink-dim hover:text-gold transition-colors px-1">✕</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Section tabs -->
    <nav class="flex gap-1 px-4 pt-2 border-b border-room-border" id="section-tabs" style="overflow:visible">
      <!-- Archief dropdown -->
      <div class="relative flex-shrink-0" id="archief-nav-group">
        <button class="section-tab archief-tab active" id="archief-nav-btn"
          onclick="window.app.toggleArchiefMenu()">
          ☰ <span id="archief-nav-label">Archief</span> <span class="archief-arrow">▾</span>
        </button>
        <div class="archief-menu hidden" id="archief-menu">
          <button class="archief-menu-item active" data-section="personages">&#x1F464; Personages</button>
          <button class="archief-menu-item" data-section="locaties">&#x1F3F0; Locaties</button>
          <button class="archief-menu-item" data-section="organisaties">&#x1F3DB; Organisaties</button>
          <button class="archief-menu-item" data-section="voorwerpen">&#x1F3BA; Voorwerpen</button>
          <button class="archief-menu-item" data-section="documenten">&#x1F4DC; Documenten</button>
          <button class="archief-menu-item" data-section="kaart">&#x1F5FA; Kaarten</button>
        </div>
      </div>
      <!-- Directe tabs -->
      <button class="section-tab" data-section="logboek">&#x1F4D6; Logboek</button>
      <!-- Alleen zichtbaar voor ingelogde spelers -->
      <button class="section-tab hidden" data-section="mijn-karakter">&#x1F9D1; Mijn karakter</button>
      <!-- Globaal zoeken -->
      <button class="section-tab global-search-tab" id="global-search-btn" onclick="window.app.openGlobalSearch()" title="Zoeken (/)">⌕</button>
    </nav>

  <!-- Globale zoekoverlay -->
  <div id="global-search-overlay" class="global-search-overlay hidden" onclick="window.app.closeGlobalSearch(event)">
    <div class="global-search-box" onclick="event.stopPropagation()">
      <div class="global-search-input-wrap">
        <span class="global-search-icon">⌕</span>
        <input id="global-search-input" class="global-search-input" type="text"
          placeholder=""
          oninput="window.app._globalSearchRun(this.value)"
          onkeydown="if(event.key==='Escape')window.app.closeGlobalSearch()">
      </div>
      <div id="global-search-results" class="global-search-results"></div>
    </div>
  </div>

    <!-- Sections -->
    <main class="flex-1 overflow-hidden">
      <div class="section active" id="section-personages"></div>
      <div class="section" id="section-locaties"></div>
      <div class="section" id="section-organisaties"></div>
      <div class="section" id="section-voorwerpen"></div>
      <div class="section" id="section-documenten"></div>
      <div class="section" id="section-logboek"></div>
      <div class="section" id="section-kaart"></div>
      <div class="section" id="section-mijn-karakter"></div>
    </main>

    <!-- FAB -->
    <button id="fab" onclick="window.app.onFabClick()"
      class="hidden fixed bottom-6 right-6 w-14 h-14 rounded-full bg-gold text-room-bg text-2xl font-bold shadow-deep hover:scale-110 transition z-40">+</button>
  </div>

  <!-- Login modal -->
  <div class="modal-overlay" id="login-overlay">
    <div class="modal max-w-sm animate-modal-in">
      <div class="modal-head">
        <div class="font-cinzel text-lg text-gold font-bold">DM Login</div>
        <button class="modal-close" onclick="window.app.closeLoginModal()">&times;</button>
      </div>
      <div class="p-5">
        <input type="password" id="dm-password" placeholder="Wachtwoord..."
          class="w-full px-3 py-2 bg-room-bg border border-room-border rounded text-ink-bright font-crimson focus:border-gold-dim focus:outline-none"
          onkeydown="if(event.key==='Enter')window.app.login()">
        <div id="login-error" class="hidden text-seal text-sm mt-2">Verkeerd wachtwoord</div>
        <button onclick="window.app.login()"
          class="w-full mt-3 px-4 py-2 bg-gold-dim text-room-bg font-cinzel font-semibold rounded hover:bg-gold transition">Inloggen</button>
      </div>
    </div>
  </div>

  <!-- Speler karakter-kiezer modal -->
  <div class="modal-overlay" id="player-picker-overlay">
    <div class="modal max-w-lg animate-modal-in">
      <div class="modal-head">
        <div class="font-cinzel text-lg text-gold font-bold">Wie ben jij?</div>
        <button class="modal-close" onclick="window.app.closePlayerPicker()">&times;</button>
      </div>
      <div class="p-5">
        <p class="text-ink-dim text-sm mb-4 font-fell italic">Kies je personage</p>
        <div id="player-char-list" class="grid grid-cols-2 gap-3 mb-4"></div>
        <button onclick="window.app.closePlayerPicker()"
          class="w-full py-2 text-sm text-ink-dim hover:text-ink-medium border border-room-border rounded font-crimson transition">
          Anoniem verder
        </button>
      </div>
    </div>
  </div>

  <!-- Detail / Editor modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this&&!document.querySelector('#m-body form'))window.app.closeModal()">
    <div class="modal animate-modal-in">
      <div id="m-accent" class="modal-accent"></div>
      <div class="modal-head">
        <div class="flex items-center gap-2 min-w-0 flex-1">
          <button id="m-back" class="modal-back hidden" onclick="window._modalGoBack()" title="Terug">&#8592;</button>
          <div class="min-w-0">
            <div class="font-cinzel text-xl text-gold font-bold" id="m-title"></div>
            <div class="text-ink-dim text-sm italic" id="m-sub"></div>
          </div>
        </div>
        <button class="modal-close" onclick="window.app.closeModal()">&times;</button>
      </div>
      <div class="p-5 overflow-y-auto flex-1 min-h-0" id="m-body"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center">
    <button onclick="window.app.closeLightbox()" class="absolute top-4 right-5 text-white/60 hover:text-white text-3xl z-10">&times;</button>
    <img id="lb-img" class="max-w-[92vw] max-h-[92vh] object-contain rounded" src="">
    <div id="lb-title" class="absolute bottom-5 left-1/2 -translate-x-1/2 text-white/70 bg-black/50 px-4 py-1 rounded text-sm font-fell italic"></div>
  </div>

  <!-- Combat overlay — visible to everyone when combat is active -->
  <div id="combat-overlay" class="combat-overlay hidden">
    <div class="combat-modal">
      <div id="combat-modal-inner"></div>
    </div>
  </div>

  <!-- Dice roller trigger — players only, bottom-right -->
  <button id="dice-fab" class="dice-fab" onclick="window.dice.toggle()" title="Dobbelstenen gooien">
    <svg viewBox="0 0 24 22" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
      <polygon points="12,1.5 23,20.5 1,20.5"/>
      <polygon points="6.5,11.5 17.5,11.5 12,20"/>
    </svg>
  </button>

  <!-- Dice Roller Panel — players only -->
  <div id="dice-panel" class="dice-panel">
    <div class="dice-panel-head">
      <span class="dice-panel-title">⚄ Dobbelstenen</span>
      <button class="dice-panel-close" onclick="window.dice.toggle()" title="Sluiten">&times;</button>
    </div>
    <div class="dice-panel-grid">
      <button class="dice-btn" onclick="window.dice.roll(4)">d4</button>
      <button class="dice-btn" onclick="window.dice.roll(6)">d6</button>
      <button class="dice-btn" onclick="window.dice.roll(8)">d8</button>
      <button class="dice-btn" onclick="window.dice.roll(12)">d12</button>
      <button class="dice-btn dice-btn--featured" onclick="window.dice.roll(20)">d20</button>
      <button class="dice-btn" onclick="window.dice.roll(100)">d%</button>
    </div>
    <div class="dice-result" id="dice-result">
      <div class="dice-result-num" id="dice-result-num">—</div>
      <div class="dice-result-label" id="dice-result-label">Kies een dobbelsteen</div>
    </div>
    <div class="dice-history" id="dice-history"></div>
  </div>

  <!-- DM Panel trigger — DM only, bottom-right -->
  <button id="dm-panel-fab" class="dm-panel-fab dm-only hidden" onclick="window.dmPanel.toggle()" title="DM-paneel">
    <svg viewBox="0 0 20 20" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
      <circle cx="10" cy="10" r="3"/>
      <path d="M10 1v3M10 16v3M1 10h3M16 10h3M3.5 3.5l2.1 2.1M14.4 14.4l2.1 2.1M3.5 16.5l2.1-2.1M14.4 5.6l2.1-2.1"/>
    </svg>
  </button>

  <!-- DM Panel — slides up from bottom-right -->
  <div id="dm-panel" class="dm-panel dm-only">
    <div class="dm-panel-head">
      <span class="dm-panel-title">Meesterkamer</span>
      <button class="dm-panel-close" onclick="window.dmPanel.close()" title="Sluiten">&times;</button>
    </div>
    <div class="dm-panel-tabs">
      <button class="dm-tab-btn active" data-tab="tunnel"        onclick="window.dmPanel.switchTab('tunnel')"        title="Tunnel"><span class="dm-tab-icon">🌐</span><span class="dm-tab-label">Tunnel</span></button>
      <button id="dm-export-btn" class="dm-tab-btn" onclick="window.dmPanel.exportSnapshot()" title="Download snapshot"><span class="dm-tab-icon">📥</span><span class="dm-tab-label">Snapshot</span></button>
      <button class="dm-tab-btn"        data-tab="spreuken"      onclick="window.dmPanel.switchTab('spreuken')"       title="Spreuken"><span class="dm-tab-icon">📖</span><span class="dm-tab-label">Spreuken</span></button>
      <button class="dm-tab-btn"        data-tab="tafels"        onclick="window.dmPanel.switchTab('tafels')"        title="Tafels"><span class="dm-tab-icon">🎲</span><span class="dm-tab-label">Tafels</span></button>
      <button class="dm-tab-btn"        data-tab="dobbelstenen"  onclick="window.dmPanel.switchTab('dobbelstenen')"  title="Dobbelstenen">
        <span class="dm-tab-icon"><svg viewBox="0 0 24 22" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true"><polygon points="12,1.5 23,20.5 1,20.5"/><polygon points="6.5,11.5 17.5,11.5 12,20"/></svg></span>
        <span class="dm-tab-label">Dobbel</span>
      </button>
      <button class="dm-tab-btn"        data-tab="geluiden"      onclick="window.dmPanel.switchTab('geluiden')"      title="Geluiden"><span class="dm-tab-icon">🔊</span><span class="dm-tab-label">Geluiden</span></button>
      <button class="dm-tab-btn"        data-tab="monsters"      onclick="window.dmPanel.switchTab('monsters')"      title="Monsterbibliotheek"><span class="dm-tab-icon">👾</span><span class="dm-tab-label">Monsters</span></button>
      <button class="dm-tab-btn"        data-tab="gevecht"       onclick="window.dmPanel.switchTab('gevecht')"       title="Gevecht"><span class="dm-tab-icon">⚔️</span><span class="dm-tab-label">Gevecht</span></button>
    </div>
    <div class="dm-panel-body">
      <!-- Tunnel tab -->
      <div class="dm-tab-content active" data-tab="tunnel">
        <div id="dm-tunnel-content"></div>
      </div>
      <!-- Spreuken tab -->
      <div class="dm-tab-content" data-tab="spreuken"></div>
      <!-- Tafels tab -->
      <div class="dm-tab-content" data-tab="tafels">
        <div id="dm-tafels-content"></div>
      </div>
      <!-- Monsters tab -->
      <div class="dm-tab-content" data-tab="monsters">
        <div id="dm-monsters-content"></div>
      </div>
      <!-- Gevecht tab -->
      <div class="dm-tab-content" data-tab="gevecht">
        <div id="dm-gevecht-content"></div>
      </div>
      <!-- Geluiden tab -->
      <div class="dm-tab-content" data-tab="geluiden">
        <div id="dm-geluiden-content"></div>
      </div>
      <!-- Dobbelstenen tab -->
      <div class="dm-tab-content" data-tab="dobbelstenen">
        <div class="dm-feature-section" style="padding-bottom:6px;border-bottom:1px solid rgba(58,40,16,0.4)">
          <div class="dm-feature-row" style="align-items:center;gap:8px">
            <span class="dm-form-label" style="flex:none">Aantal</span>
            <button class="dm-btn dm-btn-sm dm-btn-ghost" onclick="window.dice.adjustCount(-1)">−</button>
            <span id="dm-dice-count-display" class="dm-dice-count">1</span>
            <button class="dm-btn dm-btn-sm dm-btn-ghost" onclick="window.dice.adjustCount(1)">+</button>
          </div>
        </div>
        <div class="dice-panel-grid">
          <button class="dice-btn" onclick="window.dice.rollDm(4)">d4</button>
          <button class="dice-btn" onclick="window.dice.rollDm(6)">d6</button>
          <button class="dice-btn" onclick="window.dice.rollDm(8)">d8</button>
          <button class="dice-btn" onclick="window.dice.rollDm(12)">d12</button>
          <button class="dice-btn dice-btn--featured" onclick="window.dice.rollDm(20)">d20</button>
          <button class="dice-btn" onclick="window.dice.rollDm(100)">d%</button>
        </div>
        <div class="dice-result" id="dm-dice-result">
          <div class="dice-result-num" id="dm-dice-result-num">—</div>
          <div class="dice-result-label" id="dm-dice-result-label">Kies een dobbelsteen</div>
        </div>
        <div class="dice-history" id="dm-dice-history"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/sound-manager.js?v=1"></script>
  <script type="module" src="/js/app.js?v=17"></script>
</body>
</html>
